<script>
  // Gudang Kata-Kata Thayarul Ahlam
  const listHikmah = [
    "Kehidupan ini ibarat sirkuit ponsel; terkadang ada jalur yang putus, namun dengan doa dan kesabaran, Sang Pencipta akan menyambungkannya kembali menjadi aliran yang lebih indah.",

  // Fungsi untuk mengambil kata secara acak
  function tampilkanHikmah() {
    const acak = Math.floor(Math.random() * listHikmah.length);
    document.getElementById('kutipan-hikmah').innerText = listHikmah[acak];
  }

  // Jalankan fungsi saat halaman dibuka
  tampilkanHikmah();
</script>
