<!DOCTYPE HTML>
<html>
<head>
    <title>Arsip Otomatis ST-Notes</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: auto; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 10px; }
        h1 { border-bottom: 2px solid #3498db; padding-bottom: 10px; font-size: 1.5em; }
        #feed-container { list-style: none; padding: 0; }
        .post-item { background: #34495e; margin: 10px 0; padding: 15px; border-radius: 5px; transition: 0.3s; border-left: 5px solid #3498db; }
        .post-item:hover { background: #3498db; transform: scale(1.02); }
        .post-item a { color: white; text-decoration: none; display: block; font-weight: bold; }
        .loading { text-align: center; color: #bdc3c7; }
        .back-btn { display: inline-block; margin-top: 20px; color: #bdc3c7; font-size: 0.9em; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📖 Catatan Al-Barokah</h1>
        <p>Artikel terbaru langsung dari meja kerja.</p>
        
        <div id="feed-container" class="loading">Sedang mengambil catatan...</div>

        <a href="../" class="back-btn">← Kembali ke Utama</a>
    </div>

    <script>
        // GANTI ALAMAT DI BAWAH INI DENGAN ALAMAT BLOGGER SOBAT
        const BLOG_URL = 'https://alb4rokah.blogspot.com'; 
        
        async function fetchBloggerFeed() {
            try {
                // Kita pakai bantuan RSS2JSON agar jalurnya lancar
                const RSS_URL = `https://api.rss2json.com/v1/api.json?rss_url=${BLOG_URL}/feeds/posts/default`;
                
                const response = await fetch(RSS_URL);
                const data = await response.json();
                const container = document.getElementById('feed-container');
                
                if (data.status === 'ok') {
                    container.innerHTML = '';
                    container.className = '';

                    data.items.forEach(item => {
                        const title = item.title;
                        const link = item.link;
                        
                        const li = document.createElement('div');
                        li.className = 'post-item';
                        li.innerHTML = `<a href="${link}" target="_blank">${title}</a>`;
                        container.appendChild(li);
                    });
                } else {
                    throw new Error('Data tidak ok');
                }
            } catch (error) {
                document.getElementById('feed-container').innerHTML = 'Gagal memuat catatan. Coba refresh atau cek koneksi.';
            }
        }
        fetchBloggerFeed();
    </script>
</body>
</html>
